services:
  - type: web
    name: ai-screen-detector-backend
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: npm start
    envVars:
      - key: SIGHTENGINE_API_USER
        sync: false
      - key: SIGHTENGINE_API_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false
